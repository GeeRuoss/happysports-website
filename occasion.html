<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Occasion – Happy Sports</title>
  <meta name="description" content="Vélos et équipements d'occasion révisés – Happy Sports Le Châble Verbier"/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body data-page="occasion">

  <div id="site-nav"></div>

  <!-- Page hero -->
  <section class="page-hero">
    <div class="container page-hero-inner">
      <span class="eyebrow" data-i18n="occ_tag"></span>
      <h1 data-i18n="occ_title"></h1>
      <p data-i18n="occ_sub"></p>
    </div>
  </section>

  <div id="info-strip"></div>

  <!-- Products section -->
  <section class="section">
    <div class="container">

      <!-- Filters -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all" data-i18n="filter_all"></button>
        <button class="filter-btn" data-cat="velo" data-i18n="filter_velo"></button>
        <button class="filter-btn" data-cat="vtt" data-i18n="filter_vtt"></button>
        <button class="filter-btn" data-cat="ebike" data-i18n="filter_ebike"></button>
        <button class="filter-btn" data-cat="ski" data-i18n="filter_ski"></button>
        <button class="filter-btn" data-cat="acc" data-i18n="filter_acc"></button>
      </div>

      <!-- Grid -->
      <div class="products-grid" id="products-grid"></div>

    </div>
  </section>

  <!-- Reservation modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div id="modal-form-view">
        <div class="modal-header">
          <h3 data-i18n="modal_title"></h3>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-product-info" id="modal-product-info"></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="modal_name"></label>
              <input type="text" id="f-name" autocomplete="name"/>
            </div>
            <div class="form-group">
              <label data-i18n="modal_phone"></label>
              <input type="tel" id="f-phone" autocomplete="tel"/>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="modal_email"></label>
            <input type="email" id="f-email" autocomplete="email"/>
          </div>
          <div class="modal-notice" data-i18n="modal_notice"></div>
          <button class="btn-submit" id="btn-submit" onclick="submitReservation()" data-i18n="modal_submit"></button>
        </div>
      </div>
      <div id="modal-success-view" style="display:none">
        <div class="modal-success">
          <div class="modal-success-icon">✅</div>
          <h3 data-i18n="modal_success_title"></h3>
          <p data-i18n="modal_success_text"></p>
          <button class="modal-success-close" onclick="closeModal()" data-i18n="modal_close_btn"></button>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script>
    let currentProductId = null;
    let currentFilter = 'all';

    function renderProducts(filter) {
      const grid = document.getElementById('products-grid');
      const products = HS_DATA.getProducts().filter(p => p.available);
      const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="products-empty"><div class="products-empty-icon">🔍</div><p>Aucun article dans cette catégorie pour le moment.</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const discount = p.origPrice ? Math.round((1 - p.price / p.origPrice) * 100) : 0;
        return `
        <div class="product-card">
          <div class="product-img">${p.emoji || '🏷️'}</div>
          <div class="product-body">
            <div class="product-cat">${HS_DATA.catLabel(p.cat)}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
            <div class="product-price-row">
              <span class="product-price">${HS_DATA.formatPrice(p.price)}</span>
              ${p.origPrice && p.origPrice > p.price ? `<span class="product-price-orig">${HS_DATA.formatPrice(p.origPrice)}</span>` : ''}
              ${discount > 0 ? `<span class="product-badge">–${discount}%</span>` : ''}
            </div>
          </div>
          <div class="product-footer">
            <button class="btn-book" onclick="openModal('${p.id}')" data-i18n="reserve_btn">${t('reserve_btn')}</button>
          </div>
        </div>`;
      }).join('');
    }

    function setFilter(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
      });
      renderProducts(cat);
    }

    function openModal(productId) {
      currentProductId = productId;
      const p = HS_DATA.getProducts().find(x => x.id === productId);
      if (!p) return;
      document.getElementById('modal-product-info').innerHTML = `
        <div class="modal-product-icon">${p.emoji || '🏷️'}</div>
        <div>
          <div class="modal-product-name">${p.name}</div>
          <div class="modal-product-price">${HS_DATA.formatPrice(p.price)}</div>
        </div>
      `;
      document.getElementById('modal-form-view').style.display = 'block';
      document.getElementById('modal-success-view').style.display = 'none';
      ['f-name','f-phone','f-email'].forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
        el.classList.remove('input-error');
      });
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('f-name').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
      currentProductId = null;
    }

    function submitReservation() {
      const name  = document.getElementById('f-name').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const email = document.getElementById('f-email').value.trim();
      let valid = true;
      [['f-name', name], ['f-phone', phone], ['f-email', email]].forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (!val) { el.classList.add('input-error'); valid = false; }
        else el.classList.remove('input-error');
      });
      if (!email.includes('@')) {
        document.getElementById('f-email').classList.add('input-error');
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = '…';

      setTimeout(() => {
        HS_DATA.addReservation(currentProductId, { name, email, phone });
        document.getElementById('modal-form-view').style.display = 'none';
        document.getElementById('modal-success-view').style.display = 'block';
        btn.disabled = false;
        applyI18n();
      }, 600);
    }

    /* Filter button clicks */
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (btn) setFilter(btn.dataset.cat);
    });

    /* Close on overlay click */
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    /* ESC key */
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* Initial render */
    renderProducts('all');
  </script>
</body>
</html>
